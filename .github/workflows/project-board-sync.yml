name: Project board sync

concurrency:
  group: project-board-sync-${{ github.repository }}
  cancel-in-progress: true

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  sync-board:
    runs-on: ubuntu-latest
    # secrets não podem ser usados em expressões if:; mapeamos para env de job
    env:
      GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PROJECT_TOKEN }}
          persist-credentials: true

      - name: Reconcile + sync board
        if: ${{ env.GH_PROJECT_TOKEN != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ env.GH_PROJECT_TOKEN }}
        run: |
          ./scripts/agents/github-project.ps1 reconcile
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            ./scripts/agents/github-project.ps1 dedupe-backlog
            ./scripts/agents/github-project.ps1 sync-backlog
            ./scripts/agents/github-project.ps1 sync-status
          } else {
            ./scripts/agents/github-project.ps1 sync-status
          }

      - name: Export phase status
        if: ${{ env.GH_PROJECT_TOKEN != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ env.GH_PROJECT_TOKEN }}
        run: ./scripts/agents/export-phase-status.ps1

      - name: Commit phase-status snapshot
        if: ${{ env.GH_PROJECT_TOKEN != '' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ env.GH_PROJECT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/phase-status.generated.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(ops): atualizar phase-status.generated.json"
          git pull --rebase origin main
          git push

      - name: Resolve project URL from config
        id: project
        shell: pwsh
        run: |
          $path = '.github/project/arah-sustentacao.yml'
          if (-not (Test-Path $path)) { exit 0 }
          $raw = Get-Content $path -Raw
          if ($raw -match '(?m)^project_url:\s*"(https://[^"]+)"') {
            "url=$($Matches[1])" >> $env:GITHUB_OUTPUT
          }

      - name: Add new issue to project board
        if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && steps.project.outputs.url != '' && env.GH_PROJECT_TOKEN != '' }}
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ steps.project.outputs.url }}
          github-token: ${{ env.GH_PROJECT_TOKEN }}
