<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arah — Opções de logo</title>
<style>
  @font-face { font-family:"Sora"; src:url("../fonts/Sora-VariableFont_wght.ttf") format("truetype"); font-weight:100 800; }
  @font-face { font-family:"Geist"; src:url("../fonts/Geist-VariableFont_wght.ttf") format("truetype"); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; }
  body { background:#0B0C0A; color:#F2F4EE; font-family:"Geist",sans-serif; padding:40px 28px 60px; -webkit-font-smoothing:antialiased; }
  h1 { font-family:"Sora"; font-weight:700; font-size:26px; letter-spacing:-0.6px; }
  .sub { color:#A6AC9E; font-size:14px; margin-top:8px; max-width:60ch; line-height:1.55; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:32px; }
  .card { background:linear-gradient(160deg,#1C201A,#161814); border:1px solid rgba(255,255,255,0.08); border-radius:22px; padding:26px; box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 14px 34px rgba(0,0,0,0.4); }
  .tile { width:84px; height:84px; border-radius:24px; background:linear-gradient(155deg,#1B2A20,#11180F); border:1px solid rgba(255,255,255,0.13); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 14px 34px rgba(0,0,0,0.4); }
  .row { display:flex; align-items:center; gap:14px; margin-top:22px; }
  .lockup { display:flex; align-items:center; gap:10px; }
  .word { font-family:"Sora"; font-weight:700; font-size:26px; letter-spacing:-0.6px; }
  .name { font-family:"Sora"; font-weight:600; font-size:17px; margin-top:18px; }
  .desc { color:#A6AC9E; font-size:12.5px; margin-top:5px; line-height:1.5; }
  .scale { display:flex; align-items:flex-end; gap:14px; margin-top:18px; }
  .pill { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:#A6D6B9; background:rgba(129,199,132,0.13); padding:3px 10px; border-radius:999px; margin-top:14px; }
  .light { background:#F2F8F4; border-color:rgba(0,0,0,0.06); }
  .light .word { color:#0E2117; }
</style>
</head>
<body>
<div id="bundler"></div>
<template id="__bundler_thumbnail"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#0B0C0A"/><path d="M50 88 C26 72 16 44 28 18 C48 32 58 62 50 88 Z" fill="#5FB07F"/><path d="M50 88 C74 72 84 44 72 18 C52 32 42 62 50 88 Z" fill="#A6D6B9"/></svg></template>

<h1>Opções de logo — Arah</h1>
<p class="sub">Quatro marcas minimalistas, harmonizadas com a proposta território-primeiro. Todas funcionam em tamanho pequeno e mantêm o verde-copa da marca. A escolhida hoje no app é a <b style="color:#A6D6B9">Folha-Asa</b> — folha e asa ao mesmo tempo.</p>

<div class="grid" id="grid"></div>

<script>
function mark(variant, size, tone) {
  var light = tone==='ink' ? '#0E1F12' : '#A6D6B9';
  var deep  = tone==='ink' ? '#0E1F12' : '#5FB07F';
  var solid = tone==='ink' ? '#0E1F12' : '#81C784';
  var inner = {
    wingleaf: '<path d="M12 40 C7 26 16 12 40 8 C33 23 26 35 12 40 Z" fill="'+deep+'"/><path d="M14.5 37.5 C12.5 27 19 16.5 35 11.5 C29.5 23 22.5 32.5 14.5 37.5 Z" fill="'+light+'"/><g stroke="#0E2117" stroke-width="1.7" stroke-linecap="round" opacity="0.6"><path d="M15 37 L33.5 13"/><path d="M19.5 31.5 L27.5 28.5"/><path d="M22.5 26.5 L30.5 23.5"/><path d="M25.5 21.5 L32.5 18.5"/></g>',
    wing: '<path d="M24 43 C12 35 7 21 13 8 C23 15 28 30 24 43 Z" fill="'+deep+'"/><path d="M24 43 C36 35 41 21 35 8 C25 15 20 30 24 43 Z" fill="'+light+'"/>',
    leaf: '<path d="M24 5 C37 15 37 33 24 44 C11 33 11 15 24 5 Z" fill="'+light+'"/><path d="M24 11 L24 39" stroke="#13241A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>',
    pin:  '<path d="M24 4 C15 4 8 11 8 20 C8 31 24 44 24 44 C24 44 40 31 40 20 C40 11 33 4 24 4 Z" fill="'+solid+'"/><path d="M24 12 C30 16 30 25 24 30 C18 25 18 16 24 12 Z" fill="#0E1F12"/>'
  }[variant];
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 48 48" style="display:block">'+inner+'</svg>';
}
var opts = [
  { v:'wingleaf', name:'Folha-Asa (recomendada)', desc:'Uma folha inclinada cujas nervuras viram barbas de pena — folha e asa ao mesmo tempo. Voo + crescimento, território vivo.' },
  { v:'wing', name:'Voo', desc:'Duas folhas-asas subindo — simetria e calor.' },
  { v:'leaf', name:'Folha', desc:'Folha única com nervura — simplicidade absoluta.' },
  { v:'pin',  name:'Lugar', desc:'Pino de território com folha vazada.' },
];
document.getElementById('grid').innerHTML = opts.map(function(o){
  return '<div class="card">'+
    '<div class="row"><div class="tile">'+mark(o.v,48)+'</div>'+
      '<div class="lockup">'+mark(o.v,34)+'<span class="word">Arah</span></div></div>'+
    '<div class="name">'+o.name+'</div><div class="desc">'+o.desc+'</div>'+
    '<div class="scale">'+[40,28,20,16].map(function(s){return mark(o.v,s);}).join('')+'</div>'+
    '<div class="pill">escala mínima 16px ✓</div>'+
  '</div>';
}).join('');
</script>
</body>
</html>
