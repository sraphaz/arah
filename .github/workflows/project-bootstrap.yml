name: Bootstrap GitHub Project

# GITHUB_TOKEN não acessa Projects v2 — requer secret GH_PROJECT_TOKEN (PAT classic: project + repo)
# Repo → Settings → Secrets → Actions → New repository secret

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require GH_PROJECT_TOKEN
        shell: pwsh
        env:
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          if (-not $env:GH_PROJECT_TOKEN) {
            Write-Error @"
          Secret GH_PROJECT_TOKEN ausente.

          1. GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)
             Scopes: project, repo
          2. Repo arah → Settings → Secrets and variables → Actions → New repository secret
             Name: GH_PROJECT_TOKEN
          3. Re-execute este workflow (Actions → Bootstrap GitHub Project → Run workflow)
          "@
          }

      - name: Bootstrap (project, views, issues, board)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: ./scripts/agents/github-project.ps1 bootstrap

      - name: Upload phase-status artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase-status
          path: .github/phase-status.generated.json
          if-no-files-found: warn

      - name: Commit project config (project_number + URL)
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/project/arah-sustentacao.yml
          git diff --staged --quiet && exit 0
          git commit -m "chore(ops): registrar GitHub Project (bootstrap)"
          git pull --rebase origin main
          git push
