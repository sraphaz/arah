# Copie para docs/specs/features/<nome>.spec.yaml ou docs/specs/phases/<fase>.spec.yaml
#
# Critérios de aceite no formato EARS (Easy Approach to Requirements Syntax):
#   when: gatilho/condição observável ("Quando <evento>", "Enquanto <estado>")
#   then: resposta verificável do sistema ("o sistema deve <comportamento mensurável>")
# `when` é opcional para requisitos ubíquos ("O sistema deve sempre...").
#
# Rastreabilidade AC ↔ teste (Definition of Done §2):
#   status: pending | covered | manual
#   covered_by: filtro dotnet test (ex.: "FullyQualifiedName~MeuController") — obrigatório se covered
#   evidence: artefato verificável (script, workflow, screenshot) — obrigatório se manual

id: example-feature
version: "1.0.0"
title: "Título da capability"
owner: backend
status: draft
phase: null

intent: |
  Uma ou duas frases — o quê e por quê. Sem prescrever implementação.

acceptance:
  - id: AC-1
    when: "Quando o usuário executa a ação X"
    then: "o sistema deve responder com comportamento verificável e mensurável"
    status: pending
  - id: AC-2
    when: "Quando o endpoint /exemplo recebe payload válido"
    then: "retorna 200 com contrato documentado; teste de integração HTTP cobre o AC"
    status: pending

harness:
  commands:
    - "dotnet test backend/Tests/Arah.Tests/Arah.Tests.csproj --configuration Release"
  scripts: []
  agents:
    - backend

links:
  docs: []
  tests: []
  handoff: []

guardrails:
  - territory-first
  - no-merge-automatic
  - sync-docs-on-behavior-change
