name: Agents Validate

on:
  pull_request:
    paths:
      - '.agents/**'
      - '.skills/**'
      - 'AGENTS.md'
      - 'CODEOWNERS'
      - 'scripts/agents/**'
      - '.github/workflows/agents-validate.yml'
      - '.github/workflows/agents.yml'
  push:
    branches: [main]
    paths:
      - '.agents/**'
      - '.skills/**'
      - 'AGENTS.md'

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate agent & skill manifests
        shell: pwsh
        run: ./scripts/agents/validate-manifests.ps1

  agent-pr-checklist:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Remind agent PR template
        run: |
          echo "## Agent infrastructure PR" >> $GITHUB_STEP_SUMMARY
          echo "Ensure PR body includes: Agente, Skills, sync-docs checklist (see .agents/templates/pr-body.md)" >> $GITHUB_STEP_SUMMARY
