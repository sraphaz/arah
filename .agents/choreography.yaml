# Coreografia de agentes — autonomia e co-ativação
version: 2
updated: 2026-07-23
policy: |
  Regras aplicadas após roteamento do orquestrador. Agentes de domínio (negócio)
  publicam parecer consultivo; operacionais ativam checklist + skills.
  Trilha Inteligência Territorial: seis agentes consultivos (nunca publicam).

rules:
  - id: core-control-plane
    paths:
      - backend/Arah.Core/**
    agents:
      - id: backend
        type: operational
        autonomy: [activate]
      - id: solutions-architect
        type: operational
        autonomy: [activate, consult_post, invoke_skill]
        skills: [architecture-review, craft-review]
      - id: spec-steward
        type: operational
        autonomy: [activate]
      - id: control-plane
        type: domain
        autonomy: [consult_post]

  - id: architecture-docs
    paths:
      - docs/architecture/**
      - docs/design/*.likec4
      - docs/architecture/likec4/**
    agents:
      - id: solutions-architect
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [likec4-export, architecture-review, craft-review]

  - id: territory-membership
    paths:
      - backend/**/Territories/**
      - backend/**/Memberships/**
      - backend/Arah.Domain/Territories/**
    agents:
      - id: territorio-membership
        type: domain
        autonomy: [consult_post]

  - id: marketplace
    paths:
      - backend/Arah.Modules.Marketplace/**
      - backend/**/Marketplace/**
      - backend/Arah.Application/Services/Marketplace/**
      - backend/**/Cart/**
      - backend/**/Stores/**
      - backend/**/Items/**
    agents:
      - id: mercado-economia
        type: domain
        autonomy: [consult_post]

  - id: governance
    paths:
      - backend/**/Moderation/**
      - backend/**/Voting/**
      - backend/**/Votings/**
    agents:
      - id: governanca-transparencia
        type: domain
        autonomy: [consult_post]

  - id: feed-content
    paths:
      - backend/Arah.Modules.Feed/**
      - backend/**/Feed/**
      - backend/Arah.Modules.Events/**
      - backend/**/Events/**
      - backend/Arah.Domain/Media/**
      - backend/Arah.Application/Services/Media/**
      - frontend/arah.app/lib/features/feed/**
      - frontend/arah.app/lib/features/events/**
    agents:
      - id: feed-conteudo
        type: domain
        autonomy: [consult_post]

  - id: map-places
    paths:
      - backend/Arah.Modules.Map/**
      - backend/**/Map/**
      - backend/Arah.Modules.Assets/**
      - backend/**/Assets/**
      - backend/Arah.Domain/Geo/**
      - frontend/arah.app/lib/features/map/**
      - frontend/arah.app/lib/features/explore/**
    agents:
      - id: mapa-lugares
        type: domain
        autonomy: [consult_post]

  - id: community-connections
    paths:
      - backend/Arah.Modules.Chat/**
      - backend/**/Chat/**
      - backend/Arah.Modules.Connections/**
      - backend/**/Connections/**
      - backend/Arah.Modules.Notifications/**
      - backend/**/Notifications/**
      - backend/Arah.Modules.Alerts/**
      - backend/**/Alerts/**
      - backend/Arah.Domain/Social/**
      - frontend/arah.app/lib/features/chat/**
      - frontend/arah.app/lib/features/connections/**
      - frontend/arah.app/lib/features/notifications/**
    agents:
      - id: comunidade-conexoes
        type: domain
        autonomy: [consult_post]

  - id: identity-privacy
    paths:
      - backend/Arah.Domain/Users/**
      - backend/Arah.Application/Services/Users/**
      - backend/Arah.Domain/Policies/**
      - backend/**/Policies/**
      - backend/Arah.Api/Controllers/Users/**
      - frontend/arah.app/lib/features/auth/**
      - frontend/arah.app/lib/features/profile/**
    agents:
      - id: identidade-privacidade
        type: domain
        autonomy: [consult_post]
      - id: security
        type: operational
        autonomy: [activate]

  - id: monetization
    paths:
      - backend/**/Subscriptions/**
      - backend/**/Stripe/**
      - backend/**/SellerBalance/**
      - backend/**/Payout/**
      - backend/**/PlatformFinancial/**
      - backend/Arah.Domain/Financial/**
      - backend/**/Financial/**
      - backend/Arah.Application/Services/Marketplace/TransactionQuoteService.cs
      - backend/Arah.Application/Services/Marketplace/CommercialStoreGateService.cs
    agents:
      - id: monetizacao-split
        type: domain
        autonomy: [consult_post]
      - id: carteira-arata
        type: domain
        autonomy: [consult_post]

  - id: infra-deploy
    paths:
      - .github/workflows/deploy-staging.yml
      - .github/workflows/deploy-production.yml
      - .github/workflows/cd.yml
      - docker-compose.yml
      - Dockerfile
      - docs/ops/CI_CD_PIPELINE.md
    agents:
      - id: backend
        type: operational
        autonomy: [activate]
      - id: release
        type: operational
        autonomy: [activate]
      - id: control-plane
        type: domain
        autonomy: [consult_post]

  - id: federation-handoff
    paths:
      - docs/handoff/arquitetura-c4/Anexo Handoff - Operacao Instancias e Federacao.dc.html
      - docs/backlog-api/FASE58.md
      - docs/backlog-api/FASE59.md
      - backend/Arah.Api/Controllers/Platform/FederationController.cs
      - backend/Arah.Core/Application/Federation*
    agents:
      - id: control-plane
        type: domain
        autonomy: [consult_post]
      - id: solutions-architect
        type: operational
        autonomy: [consult_post]

  # Multiagente TI — sinais externos → revisão humana → brief/ação/memória.
  # Todos consultivos: nunca publicam; governance-steward audita invariantes.
  - id: inteligencia-territorial
    paths:
      - backend/**/Intelligence/**
      - backend/**/Providers/WorldMonitor/**
      - docs/handoff/inteligencia-territorial/**
      - docs/backlog-api/TI*.md
      - docs/backlog-api/REALINHAMENTO_INTELIGENCIA_TERRITORIAL.md
      - docs/specs/features/TI-*.spec.yaml
      - .agents/domain/signal-scout.agent.yaml
      - .agents/domain/territorial-analyst.agent.yaml
      - .agents/domain/source-steward.agent.yaml
      - .agents/domain/community-brief-writer.agent.yaml
      - .agents/domain/response-orchestrator.agent.yaml
      - .agents/domain/intelligence-governance-steward.agent.yaml
    agents:
      - id: signal-scout
        type: domain
        autonomy: [consult_post]
      - id: territorial-analyst
        type: domain
        autonomy: [consult_post]
      - id: source-steward
        type: domain
        autonomy: [consult_post]
      - id: community-brief-writer
        type: domain
        autonomy: [consult_post]
      - id: response-orchestrator
        type: domain
        autonomy: [consult_post]
      - id: intelligence-governance-steward
        type: domain
        autonomy: [consult_post]
      - id: backend
        type: operational
        autonomy: [activate]
      - id: spec-steward
        type: operational
        autonomy: [activate]
      - id: solutions-architect
        type: operational
        autonomy: [consult_post, invoke_skill]
        skills: [architecture-review]

  - id: specs-sdd
    paths:
      - docs/specs/**
      - scripts/harness/**
    agents:
      - id: spec-steward
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [spec-validate, harness-run]

  - id: design-ux
    paths:
      - frontend/wiki/**
      - frontend/portal/**
      - frontend/devportal/**
      - frontend/arah.app/**
      - frontend/shared/styles/**
      - frontend/**/*.css
      - frontend/**/tailwind.config.ts
      - docs/DESIGN_SYSTEM_IDENTIDADE_VISUAL.md
      - docs/CURSOR_DESIGN_RULES.md
      - docs/design/**
      - docs/**/design*
    agents:
      - id: design-ux
        type: domain
        autonomy: [consult_post]

  - id: craft-backend
    paths:
      - backend/Arah.Api/**
      - backend/Arah.Api.Bff/**
      - backend/Arah.Application/**
      - backend/Arah.Domain/**
      - backend/Arah.Infrastructure/**
      - backend/Arah.Modules.*/**
    agents:
      - id: backend
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [craft-review]
      - id: solutions-architect
        type: operational
        autonomy: [consult_post, invoke_skill]
        skills: [craft-review]

  - id: craft-flutter
    paths:
      - frontend/arah.app/lib/**
    agents:
      - id: flutter
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [craft-review]

  - id: craft-web
    paths:
      - frontend/wiki/**
      - frontend/portal/**
      - frontend/devportal/**
    agents:
      - id: web
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [craft-review]

  - id: pr-always
    paths:
      - "**"
    when: pull_request
    agents:
      - id: qa
        type: operational
        autonomy: [activate, invoke_skill]
        skills: [craft-review]
      - id: pr-steward
        type: operational
        autonomy: [activate]
