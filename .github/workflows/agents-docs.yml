name: Agents Docs Index

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/agents/generate-docs-index.ps1'

permissions:
  contents: write
  pull-requests: write

jobs:
  doc-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate INDEX.generated.md
        shell: pwsh
        run: ./scripts/agents/arah-agents.ps1 doc-index

      - name: Commit index if changed
        run: |
          if git diff --quiet docs/INDEX.generated.md; then
            echo "No index changes"
            exit 0
          fi
          git config user.name "arah-docs-steward"
          git config user.email "docs-steward@users.noreply.github.com"
          git add docs/INDEX.generated.md
          git commit -m "chore(docs): regenerate INDEX.generated.md [docs-steward]"
          git push
