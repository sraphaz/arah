# Piloto FASE54 — API + PostgreSQL (reproduzível do zero)
name: pilot

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arah
      POSTGRES_PASSWORD: arah
      POSTGRES_DB: arah_pilot
    ports:
      - "5433:5432"
    volumes:
      - arah_pilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arah -d arah_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Staging
      JWT__SIGNINGKEY: pilot-only-change-me-minimum-32-chars
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=arah_pilot;Username=arah;Password=arah
      Persistence__Provider: Postgres
      Persistence__ApplyMigrations: "true"
      Pilot__BootstrapAdminEnabled: "true"
      Stripe__SecretKey: ${STRIPE__SECRETKEY:-}
    ports:
      - "8080:8080"

  caddy:
    profiles: ["https"]
    image: caddy:2
    depends_on:
      - api
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  arah_pilot_pgdata:
