id: release
name: Release / DevOps Agent
description: CI/CD, versões, changelog de release, IaC (quando existir).
triggers:
  - push:branch=main
  - issue:label=area/ops
  - workflow_dispatch
scope:
  paths:
    - .github/**
    - scripts/**
    - docker-compose.yml
    - docker-compose.staging.yml
    - Dockerfile
    - global.json
  commands:
    - dotnet build
skills:
  - release-cut
  - iac-plan
  - run-tests
  - open-pr
checklist: checklists/release.checklist.md
guardrails:
  no_merge: true
  require_ci: true
  production_gate: human
