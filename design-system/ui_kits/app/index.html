<style>
  @font-face {
    font-family: "Geist";
    src: url("../../fonts/Geist-VariableFont_wght.ttf") format("truetype");
    font-weight: 100 900; font-display: swap;
  }
  @font-face {
    font-family: "Sora";
    src: url("../../fonts/Sora-VariableFont_wght.ttf") format("truetype");
    font-weight: 100 800; font-display: swap;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #0a0b09;
    background-image: radial-gradient(120% 80% at 50% -10%, #16201a 0%, #0a0b09 60%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px; font-family: "Geist", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .msr {
    font-family: "Material Symbols Rounded";
    font-weight: normal; font-style: normal;
    -webkit-font-feature-settings: "liga"; font-feature-settings: "liga";
    -webkit-font-smoothing: antialiased;
  }
  /* hide scrollbars in app */
  .appscroll::-webkit-scrollbar, .noscroll::-webkit-scrollbar { display: none; }
  .appscroll, .noscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .noscroll { overflow-x: auto; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Smooth, harmonic screen transition: darken-out then fade-and-rise in */
  @keyframes screenIn {
    0%   { opacity: 0; transform: translateY(10px) scale(0.992); filter: brightness(0.5); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
  }
  .screen-fade { animation: screenIn 0.42s cubic-bezier(0.16, 1, 0.3, 1); will-change: opacity, transform; }
  @media (prefers-reduced-motion: reduce) { .screen-fade { animation: none; } }
  button { font-family: inherit; }
</style>
