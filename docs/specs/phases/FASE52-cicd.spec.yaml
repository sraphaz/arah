id: FASE52-cicd
version: "1.0.0"
title: "FASE52 — Fundação CI/CD"
owner: ops
status: completed
phase: FASE52

intent: |
  Cadeia PR → CI → GHCR → staging automático → gate manual produção,
  com health checks e secrets fora do repositório.

acceptance:
  - id: AC-52-1
    then: "Todo PR dispara CI (build + test)"
    status: manual
    evidence: ".github/workflows/ci.yml — verificável via run do GitHub Actions"
  - id: AC-52-2
    then: "Merge main publica imagens ghcr.io/.../arah-api e arah-bff com tag sha"
    status: manual
    evidence: ".github/workflows (CD) — verificável via pacotes GHCR"
  - id: AC-52-3
    then: "deploy-staging.yml valida /health API e BFF após CD"
    status: manual
    evidence: ".github/workflows/deploy-staging.yml — step de health"
  - id: AC-52-4
    then: "deploy-production.yml exige confirm=DEPLOY e environment production"
    status: manual
    evidence: ".github/workflows/deploy-production.yml — input confirm + environment"
  - id: AC-52-5
    then: "docs/ops/CI_CD_PIPELINE.md documenta fluxo e secrets"
    status: manual
    evidence: "docs/ops/CI_CD_PIPELINE.md"
  - id: AC-52-6
    then: "Observabilidade baseline — /metrics Prometheus + smoke CD (docs/ops/OBSERVABILITY_BASELINE.md)"
    status: manual
    evidence: "docs/ops/OBSERVABILITY_BASELINE.md + endpoint /metrics"

harness:
  scripts:
    - scripts/agents/validate-manifests.ps1
  commands:
    - "dotnet build backend/Arah.Api/Arah.Api.csproj --configuration Release"
  agents:
    - release

links:
  docs:
    - docs/backlog-api/FASE52.md
    - docs/ops/CI_CD_PIPELINE.md
  handoff:
    - docs/handoff/arquitetura-c4/Plano Operacional e Pipelines - Arah.dc.html

guardrails:
  - no-secrets-in-repo
  - production-gate-human
