name: Agents Validate

on:
  pull_request:
    paths:
      - '.agents/**'
      - '.skills/**'
      - 'AGENTS.md'
      - 'CODEOWNERS'
      - 'scripts/agents/**'
      - 'scripts/harness/**'
      - 'docs/specs/**'
      - 'docs/_meta/**'
      - 'docs/ops/AGENT_GRAPH.md'
      - '.github/workflows/agents-validate.yml'
      - '.github/workflows/agents.yml'
  push:
    branches: [main]
    paths:
      - '.agents/**'
      - '.skills/**'
      - 'AGENTS.md'
      - 'CODEOWNERS'
      - 'scripts/agents/**'
      - 'scripts/harness/**'
      - 'docs/specs/**'
      - 'docs/_meta/**'
      - 'docs/ops/AGENT_GRAPH.md'
      - '.github/workflows/agents-validate.yml'
      - '.github/workflows/agents.yml'

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate agent & skill manifests
        shell: pwsh
        run: ./scripts/agents/validate-manifests.ps1

  validate-agent-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate Agent Graph (integridade + defasagem)
        shell: pwsh
        run: ./scripts/harness/validate-agent-graph.ps1

  agent-graph-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Tooling tests (yaml-lite, choreography-parser, craft-review)
        shell: pwsh
        run: ./scripts/agents/tests/agent-graph.tests.ps1
      - name: MCP tests (globToRegex, gating por evento)
        run: node scripts/agents/tests/mcp.test.mjs

  agent-pr-checklist:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Remind agent PR template
        run: |
          echo "## Agent infrastructure PR" >> $GITHUB_STEP_SUMMARY
          echo "Ensure PR body includes: Agente, Skills, sync-docs checklist (see .agents/templates/pr-body.md)" >> $GITHUB_STEP_SUMMARY
