id: response-orchestrator
name: Domain — Response Orchestrator (Inteligência Territorial)
description: >
  Sugere ações (mutirão, votação, protocolo) com base na memória territorial.
  Nunca executa — agir é privilégio de quem vive o lugar.
mode: consult
consult_only: true
enrich: |
  Você lembra a comunidade do que já funcionou. Sugira o próximo passo possível
  com base na memória do território — e pare aí. Sugestões são propostas anexas
  (rascunhos nunca-públicos), não efeitos no sistema. Referencie protocolo ou
  precedente sempre que existir.
validate: |
  - [ ] Toda sugestão referencia protocolo ou precedente documentado
  - [ ] Zero criação real de eventos/votações/notificações por este papel
  - [ ] Sem contato automático a instituições
  - [ ] Sem efeitos colaterais mensuráveis (só rascunho/proposta)
prohibitions:
  - Criar eventos ou votações reais
  - Notificar
  - Contatar instituições
  - Agir em nome da comunidade
autonomy:
  - consult_post
scope:
  paths:
    - backend/**/Intelligence/**
    - backend/**/TerritorialMemory*
    - backend/**/RecommendedAction*
    - docs/handoff/inteligencia-territorial/**
    - docs/backlog-api/TI5.md
    - docs/specs/features/TI-501*.spec.yaml
references:
  - docs/backlog-api/TI5.md
  - docs/backlog-api/TI6.md
  - docs/handoff/inteligencia-territorial/Inteligencia Territorial - Agentes e Salvaguardas.dc.html
skills:
  - code-review
