name: CD

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: write   # necessário para criar GitHub Release ao publicar tag
  packages: write

jobs:
  build-and-push-api:
    name: API Docker
    runs-on: ubuntu-latest
    outputs:
      image-tag: ghcr.io/${{ github.repository }}/arah-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Arah.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/arah-api:latest
            ghcr.io/${{ github.repository }}/arah-api:${{ github.sha }}

  smoke-test-api:
    name: API smoke (/health)
    runs-on: ubuntu-latest
    needs: build-and-push-api
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull published image and smoke test
        env:
          IMAGE: ghcr.io/${{ github.repository }}/arah-api:${{ github.sha }}
        run: |
          docker pull "$IMAGE"
          docker run -d --name arah-smoke \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e JWT__SIGNINGKEY=dev-smoke-test-key-min-32-chars \
            -p 8080:8080 "$IMAGE"
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/liveness; then ok=1; break; fi
            sleep 2
          done
          curl -sf http://localhost:8080/health || true
          docker logs arah-smoke 2>&1 | tail -20
          docker stop arah-smoke
          if [ "$ok" != "1" ]; then echo "Health smoke failed"; exit 1; fi
      - name: Release agent activity (FASE52)
        if: always()
        shell: pwsh
        run: |
          & ./scripts/agents/post-agent-activity.ps1 -AgentId release -Trigger "push main / smoke-test" -Json | Set-Content agent-activity-release.json
          @"
          ## Release Agent — CD pipeline
          **Job:** smoke-test-api — ${{ job.status }}
          **Imagem:** ``ghcr.io/${{ github.repository }}/arah-api:${{ github.sha }}``
          Checklist: ``.agents/checklists/release.checklist.md``
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-activity-release
          path: agent-activity-release.json
          if-no-files-found: ignore

  build-and-push-bff:
    name: BFF Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Arah.Api.Bff/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/arah-bff:latest
            ghcr.io/${{ github.repository }}/arah-bff:${{ github.sha }}

  build-flutter-android:
    name: App Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/arah.app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true
      - name: Ensure platforms
        run: flutter create . --project-name arah_app --org com.arah --platforms=android,ios,web
      - name: Set Android minSdk 23 for Firebase Auth
        run: |
          # firebase-auth 23.x exige minSdkVersion >= 23 (template Flutter usa 21)
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i.bak -e 's/minSdkVersion 21/minSdkVersion 23/g' -e 's/minSdk 21/minSdk 23/g' -e 's/minSdk = 21/minSdk = 23/g' -e 's/flutter\.minSdkVersion/23/g' "$f"
            fi
          done
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Build App Bundle
        run: flutter build appbundle --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arah-app-android-apk
          path: frontend/arah.app/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: arah-app-android-aab
          path: frontend/arah.app/build/app/outputs/bundle/release/app-release.aab

  build-flutter-ios:
    name: App iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend/arah.app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true
      - name: Ensure platforms
        run: flutter create . --project-name arah_app --org com.arah --platforms=android,ios,web
      - name: Set iOS min 13 for firebase_auth
        run: |
          if [ -f ios/Podfile ]; then
            sed -i.bak "s/platform :ios, '[^']*'/platform :ios, '13.0'/" ios/Podfile
            sed -i.bak "s/# platform :ios, '[^']*'/platform :ios, '13.0'/" ios/Podfile
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      - name: Zip iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-Runner.app.zip Runner.app
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: arah-app-ios
          path: frontend/arah.app/build/ios-Runner.app.zip

  create-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || github.ref == 'refs/heads/main'
    needs: [build-flutter-android, build-flutter-ios]
    steps:
      - uses: actions/checkout@v4
      - name: Set release tag and name
        id: release
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::7}
            echo "tag_name=main-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "release_name=Continuous (main @ ${SHORT_SHA})" >> $GITHUB_OUTPUT
          fi
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arah-app-*
          path: artifacts
          merge-multiple: false
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          generate_release_notes: true
          files: |
            artifacts/arah-app-android-apk/app-release.apk
            artifacts/arah-app-android-aab/app-release.aab
            artifacts/arah-app-ios/ios-Runner.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
