<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, secondary, destructive" viewport="700x130" --><html lang="pt-BR"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet"/>
<style>
@font-face{font-family:"Geist";src:url("../fonts/Geist-VariableFont_wght.ttf") format("truetype");font-weight:100 900;}
@font-face{font-family:"Sora";src:url("../fonts/Sora-VariableFont_wght.ttf") format("truetype");font-weight:100 800;}
*{box-sizing:border-box;margin:0;}
body{font-family:"Geist",system-ui,sans-serif;background-color:#191B17;color:#F1F3EE;padding:22px;-webkit-font-smoothing:antialiased;}
.msr{font-family:"Material Symbols Rounded";line-height:1;}
.lbl{font-size:10.5px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#6E7468;}
.mono{font-family:ui-monospace,monospace;}
.card{background:#191B17;border:1px solid rgba(255,255,255,0.07);border-radius:18px;}
</style></head><body style="height:130px;"><div class="lbl" style="margin-bottom:14px">Buttons</div>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
<button style="display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border:none;border-radius:14px;background:#81C784;color:#0E1F12;font-family:'Geist';font-weight:600;font-size:15px"><span class="msr" style="font-size:18px;color:#0E1F12;font-variation-settings:'FILL' 1">send</span> Publicar</button>
<button style="display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border:1px solid rgba(255,255,255,0.12);border-radius:14px;background:transparent;color:#F1F3EE;font-family:'Geist';font-weight:600;font-size:15px"><span class="msr" style="font-size:18px;color:#F1F3EE;font-variation-settings:'FILL' 0">edit</span> Editar</button>
<button style="display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border:1px solid rgba(255,255,255,0.07);border-radius:14px;background:#191B17;color:#E0925A;font-family:'Geist';font-weight:600;font-size:15px"><span class="msr" style="font-size:18px;color:#E0925A;font-variation-settings:'FILL' 0">logout</span> Sair</button>
</div></body></html>
