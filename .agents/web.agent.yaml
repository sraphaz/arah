id: web
name: Web Agent
description: Wiki, portal institucional e devportal (Next.js).
triggers:
  - issue:label=area/web
  - orchestrator:delegate
scope:
  paths:
    - frontend/wiki/**
    - frontend/portal/**
    - frontend/devportal/**
  commands:
    - npm test
    - npm run type-check
skills:
  - run-tests
  - sync-docs
  - open-pr
  - code-review
  - craft-review
consult:
  specialists:
    - nextjs
checklist: checklists/web.checklist.md
guardrails:
  no_merge: true
  require_ci: true
  max_diff_files: 30
