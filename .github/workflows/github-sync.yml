name: GitHub Sync (labels, milestones, project, phase status)

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/milestones.yml'
      - '.github/project/**'
      - 'docs/_meta/PHASE_QUEUE.yaml'
      - 'scripts/agents/github-project.ps1'
      - 'scripts/agents/GitHub-ProjectApi.ps1'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/agents/sync-github-labels.ps1

      - name: Sync milestones
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/agents/sync-github-milestones.ps1

      - name: Bootstrap GitHub Project
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          if (-not $env:GH_PROJECT_TOKEN) {
            Write-Warning "GH_PROJECT_TOKEN ausente — pulando Project/views. Execute workflow 'Bootstrap GitHub Project' após configurar o secret."
            exit 0
          }
          ./scripts/agents/github-project.ps1 bootstrap

      - name: Export phase status from Issues
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/agents/export-phase-status.ps1

      - name: Upload phase-status artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase-status-${{ github.run_id }}
          path: .github/phase-status.generated.json
          if-no-files-found: ignore

      - name: Commit project config only (if changed)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          if (-not $env:GH_PROJECT_TOKEN) { exit 0 }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/project/arah-sustentacao.yml
          git diff --staged --quiet && exit 0
          git commit -m "chore(ops): sync GitHub Project config"
          git pull --rebase origin main
          git push
