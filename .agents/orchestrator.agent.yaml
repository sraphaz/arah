id: orchestrator
name: Orquestrador
description: Roteia intenções para agentes especializados; não altera código de produto.
triggers:
  - issue:labeled
  - pull_request:opened
  - manual
scope:
  paths: []
  may_code: false
skills:
  - backlog-to-issue
  - open-pr
  - harness-run
routing:
  area/backend: backend
  area/flutter: flutter
  area/web: web
  area/docs: docs-steward
  area/spec: spec-steward
  area/sdd: spec-steward
  area/architecture: solutions-architect
  area/ops: release
  area/security: security
  area/planning: planner
  area/pr-review: pr-steward
  ready-for-merge: pr-steward
co_route:
  docs/specs/**: spec-steward
  scripts/harness/**: spec-steward
  backend/Arah.Core/**: backend
  backend/**/Intelligence/**: backend
  docs/handoff/inteligencia-territorial/**: docs-steward
  docs/architecture/**: solutions-architect
  docs/architecture/adrs/**: solutions-architect
  docs/design/*.likec4: solutions-architect
  .github/workflows/spec-harness.yml: release
guardrails:
  no_merge: true
  require_ci: true
