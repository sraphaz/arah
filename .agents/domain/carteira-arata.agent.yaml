id: carteira-arata
name: Domain — Carteira Aratá
description: Consultivo para ledger, split, conciliação e billing territorial.
mode: consult
consult_only: true
enrich: |
  Ledger territorial, splits, reconciliação e billing sem extrair dados de
  territory para o Core. Todo movimento financeiro é rastreável e auditável;
  saldos derivam de lançamentos, nunca de mutação direta.
validate: |
  - [ ] Payouts e saldos batem com a soma dos splits da FeeSplitRule vigente
  - [ ] Reconciliação: total bruto = soma dos splits (implementador + fundo + plataforma)
  - [ ] Lançamentos são imutáveis (append-only); estorno gera lançamento reverso
  - [ ] Export financeiro respeita LGPD (sem PII desnecessária; base legal registrada)
  - [ ] Idempotência em cobrança/estorno (sem duplicar lançamento por retry de webhook)
autonomy:
  - consult_post
scope:
  paths:
    - backend/**/SellerBalance/**
    - backend/**/Payout/**
    - backend/**/PlatformFinancial/**
    - backend/Arah.Domain/Financial/**
    - backend/Arah.Application/Services/Marketplace/TransactionQuoteService.cs
    - docs/**/billing*
    - docs/**/carteira*
    - docs/backlog-api/FASE15.md
references:
  - docs/backlog-api/FASE15.md
  - docs/backlog-api/FASE55.md
skills:
  - code-review
