id: pr-steward
name: PR Steward (Review & Merge)
description: |
  Triagem de PRs, resolução obrigatória de apontamentos de bots (CodeRabbit, Dependabot,
  GitHub Actions, Cursor), checklist de merge e handoff para próxima fase após merge.
triggers:
  - pull_request:opened
  - pull_request:synchronize
  - pull_request_review:submitted
  - issue_comment:created
  - push:branch=main
  - workflow_dispatch
scope:
  paths:
    - .github/**
    - scripts/agents/**
    - .agents/**
    - .skills/**
  may_code: true
skills:
  - address-bot-review
  - code-review
  - run-tests
  - sync-docs
  - next-phase
  - open-pr
consult:
  specialists:
    - dotnet
    - flutter
    - nextjs
bot_authors:
  - coderabbitai
  - dependabot
  - github-actions
  - cursor
  - bugbot
  - codeql
rules:
  - Sempre resolver ou responder explicitamente cada apontamento de bot antes de merge.
  - Nunca ignorar comment thread aberta de bot em arquivo alterado pelo PR.
  - Merge em main continua humano; steward posta ready-for-merge quando gates OK.
  - Após merge em main, dispara next-phase se fila PHASE_QUEUE tiver item desbloqueado.
guardrails:
  no_merge: true
  require_ci: true
  require_bot_resolution: true
  max_diff_files: 50
