name: Agents Orchestrate

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      labels:
        description: 'Labels comma-separated (e.g. area/backend,agent-task)'
        required: false
        default: 'area/backend'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect changed files (PR)
        if: github.event_name == 'pull_request'
        id: pr_files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 2>/dev/null || true
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Orchestrate routing
        id: route
        shell: pwsh
        env:
          MANUAL_LABELS: ${{ github.event_name == 'workflow_dispatch' && inputs.labels || '' }}
          PR_FILES: ${{ steps.pr_files.outputs.files }}
        run: |
          $labels = @()
          if ($env:MANUAL_LABELS) {
            $labels = $env:MANUAL_LABELS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          $changed = @()
          if ($env:PR_FILES) {
            $changed = $env:PR_FILES -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          $params = @{
            EventPath     = $env:GITHUB_EVENT_PATH
            Json          = $true
          }
          if ($labels.Count -gt 0) { $params.Labels = $labels }
          if ($changed.Count -gt 0) { $params.ChangedFiles = $changed }
          & ./scripts/agents/arah-agents.ps1 orchestrate @params | Set-Content -Path route.json -Encoding utf8
          Get-Content route.json

      - name: Activate agents (checklists visíveis)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_FILES: ${{ steps.pr_files.outputs.files }}
        run: |
          $issue = [int]'${{ github.event.issue.number || 0 }}'
          $pr = [int]'${{ github.event.pull_request.number || 0 }}'
          $changed = @()
          if ($env:PR_FILES) {
            $changed = $env:PR_FILES -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          $trigger = "${{ github.event_name }}:${{ github.event.action }}"
          $params = @{
            RouteFile  = 'route.json'
            Trigger    = $trigger
            PostComment = $true
          }
          if ($issue -gt 0) { $params.IssueNumber = $issue }
          if ($pr -gt 0) { $params.PrNumber = $pr }
          if ($changed.Count -gt 0) { $params.ChangedFiles = $changed }
          & ./scripts/agents/run-agent-activation.ps1 @params

      - name: Upload agent activity log
        uses: actions/upload-artifact@v4
        with:
          name: agent-activity-${{ github.run_id }}
          path: agent-activity.json
          if-no-files-found: warn

      - name: Apply area label from issue template
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('route.json', 'utf8'));
            const label = payload.suggest_label;
            if (!label) return;
            const has = (context.payload.issue.labels || []).some(l => l.name === label);
            if (has) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label]
            });

      - name: Comment routing on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('route.json', 'utf8'));
            const skills = (payload.skills || []).map(s => `\`${s}\``).join(', ') || '_nenhuma listada_';
            const pathAgents = (payload.path_agents || [])
              .map(p => `- **${p.agent}**: ${(p.files || []).slice(0, 5).join(', ')}`)
              .join('\n');
            const body = [
              '## Orquestrador Arah',
              '',
              `**Agente:** \`${payload.agent}\` — ${payload.agent_name}`,
              `**Manifest:** \`${payload.manifest || '.agents/' + payload.agent + '.agent.yaml'}\``,
              `**Skills sugeridas:** ${skills}`,
              '',
              payload.message,
              '',
              pathAgents ? `**Inferência por paths:**\n${pathAgents}` : '',
              '',
              '---',
              '_Automático via `agents.yml`. Merge continua humano. Ver [AGENTS.md](https://github.com/${{ github.repository }}/blob/main/AGENTS.md)._'
            ].filter(Boolean).join('\n');

            const marker = '<!-- arah-orchestrator -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: fullBody
              });
            }

      - name: Comment routing on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('route.json', 'utf8'));
            const skills = (payload.skills || []).map(s => `\`${s}\``).join(', ') || '_nenhuma listada_';
            const pathAgents = payload.path_agents || [];
            let pathSection = '';
            if (pathAgents.length > 0) {
              pathSection = '\n**Agentes por paths alterados:**\n' + pathAgents
                .map(p => `- \`${p.agent}\` (${(p.files || []).length} arquivo(s))`)
                .join('\n');
            }
            const body = [
              '<!-- arah-orchestrator -->',
              '## Orquestrador Arah — PR',
              '',
              `**Agente principal:** \`${payload.agent}\` — ${payload.agent_name}`,
              `**Skills sugeridas:** ${skills}`,
              pathSection,
              '',
              '**QA agent** revisará este PR (checklist em `.agents/qa.agent.yaml`).',
              '',
              'Use [.agents/templates/pr-body.md](https://github.com/${{ github.repository }}/blob/main/.agents/templates/pr-body.md) no corpo do PR.',
              '',
              '---',
              '_Automático via `agents.yml`._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const existing = comments.find(c => c.body && c.body.includes('<!-- arah-orchestrator -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
